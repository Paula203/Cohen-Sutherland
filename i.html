<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cohen-Sutherland</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        canvas {
            border: 2px solid #000000;
            background: #f5f5f5;
        }
        input {
            width: 60px;
            margin: 5px;
        }
    </style>
</head>
<body>
    <h2>Recorte de Líneas (Cohen-Sutherland)</h2>

    <div>
        <b>Coordenadas Vp</b><br>
        x_min: <input type="number" id="x_min" value="150"><br>
        x_max: <input type="number" id="x_max" value="100"><br>
        y_min: <input type="number" id="y_min" value="450"><br>
        y_max: <input type="number" id="y_max" value="300"><br>
       <button onclick="updateViewport()">Actualizar VP</button>
    </div>
<br> 
<div>
    Punto A:
    x1: <input type="number" id="x1" value="100">
    y1: <input type="number" id="y1" value="50">
    <br>
    Punto B:
    x2: <input type="number" id="x2" value="500">
    y2: <input type="number" id="y2" value="350">
    <br>
    <button onclick="addLine()">Agregar Línea</button>
    <button onclick="clearCanvas()">Limpiar Canvas</button>
<br>
    <canvas id="Canvas" width="600" height="400"></canvas>
    <script src="sc.js"></script>
</body>
</html>
